<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tank Battle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="play-area" aria-label="Tank Battle 游戏区域">
        <section class="game-panel">
          <canvas
            id="game"
            width="480"
            height="480"
            aria-label="Tank Battle 游戏画布"
          ></canvas>
        </section>
        <aside class="score-panel" aria-label="计分面板">
          <h1>Score</h1>
          <div class="score-card">
            <span class="score-label">当前分数</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="score-card">
            <span class="score-label">最高分</span>
            <strong id="bestScoreValue">0</strong>
          </div>
          <div class="score-card">
            <span class="score-label">本关击杀</span>
            <strong id="stageKillsValue">0</strong>
          </div>
          <div class="score-card">
            <span class="score-label">总击杀数</span>
            <strong id="totalKillsValue">0</strong>
          </div>
        </aside>
      </section>
      <section class="info-panel">
        <h2>Tank Battle</h2>
        <p>移动：WASD / 方向键</p>
        <p>开火：空格</p>
        <p>开始 / 重开：Enter</p>
        <p>目标：守住基地，清空全部三关敌军。</p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
